<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎯 口语练习 · 跟读评分</title>
    <style>
        /* ===== 样式保持不变 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f0f5fc; color: #1e2a3a; padding: 16px 12px 30px; min-height: 100vh; display: flex; justify-content: center; }
        .app { max-width: 720px; width: 100%; background: #ffffff; border-radius: 28px; box-shadow: 0 12px 40px rgba(0,20,40,0.10); padding: 24px 20px 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .title { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; display: flex; align-items: center; gap: 6px; }
        .title span { background: linear-gradient(135deg, #2b7be4, #1a5fc7); color: #fff; font-size: 14px; font-weight: 600; padding: 0 12px; border-radius: 20px; line-height: 28px; margin-left: 6px; }
        .speed-wrap { display: flex; align-items: center; gap: 10px; background: #f2f6fc; padding: 4px 14px 4px 16px; border-radius: 30px; font-size: 14px; font-weight: 500; }
        .speed-wrap input[type="range"] { width: 100px; height: 4px; -webkit-appearance: none; appearance: none; background: #c8d8e8; border-radius: 4px; outline: none; }
        .speed-wrap input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #2b7be4; cursor: pointer; box-shadow: 0 2px 6px rgba(43,123,228,0.35); border: 2px solid #fff; }
        .speed-wrap input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: #2b7be4; cursor: pointer; border: 2px solid #fff; }
        .speed-val { min-width: 38px; text-align: center; font-weight: 600; color: #1a5fc7; }
        .input-section { background: #f7faff; border-radius: 18px; padding: 14px 16px 16px; border: 1.5px solid #e6eef8; margin-bottom: 18px; }
        .input-section:focus-within { border-color: #2b7be4; }
        .input-section textarea { width: 100%; height: 120px; border: none; background: transparent; resize: vertical; font-size: 15px; line-height: 1.7; font-family: inherit; color: #1e2a3a; outline: none; padding: 2px 0; }
        .input-section textarea::placeholder { color: #a0b8cf; }
        .input-tools { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; align-items: center; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 20px; border-radius: 30px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; transition: all 0.15s; background: #e6eef8; color: #1e2a3a; user-select: none; touch-action: manipulation; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #2b7be4; color: #fff; box-shadow: 0 4px 12px rgba(43,123,228,0.25); }
        .btn-primary:active { background: #1a5fc7; }
        .btn-outline { background: transparent; border: 1.5px solid #c8d8e8; }
        .btn-outline:active { background: #e6eef8; }
        .btn-success { background: #1fad7a; color: #fff; box-shadow: 0 4px 12px rgba(31,173,122,0.25); }
        .btn-success:active { background: #168f64; }
        .btn-warning { background: #f5a623; color: #fff; box-shadow: 0 4px 12px rgba(245,166,35,0.25); }
        .btn-warning:active { background: #d98e1a; }
        .btn-danger { background: #e45c5c; color: #fff; box-shadow: 0 4px 12px rgba(228,92,92,0.25); }
        .btn-danger:active { background: #c94747; }
        .btn-sm { padding: 5px 14px; font-size: 13px; }
        .btn:disabled { opacity: 0.5; pointer-events: none; transform: none !important; }
        .dialogue-section { margin-bottom: 18px; }
        .dialogue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
        .dialogue-header .counter { font-size: 14px; color: #5a7a9a; font-weight: 500; }
        .dialogue-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; padding-right: 4px; }
        .dialogue-list::-webkit-scrollbar { width: 4px; }
        .dialogue-list::-webkit-scrollbar-thumb { background: #c8d8e8; border-radius: 8px; }
        .dialogue-item { padding: 10px 14px; border-radius: 14px; background: #f7faff; border-left: 4px solid #c8d8e8; font-size: 15px; line-height: 1.6; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .dialogue-item .speaker { font-weight: 700; color: #2b7be4; min-width: 28px; }
        .dialogue-item .text { flex: 1; word-break: break-word; }
        .dialogue-item .score-badge { font-size: 13px; font-weight: 700; padding: 2px 12px; border-radius: 20px; background: #e6eef8; color: #2b7be4; white-space: nowrap; }
        .dialogue-item.active { background: #e3efff; border-left-color: #2b7be4; box-shadow: 0 2px 8px rgba(43,123,228,0.10); }
        .dialogue-item.done { border-left-color: #1fad7a; background: #f0faf6; }
        .dialogue-item .status-icon { font-size: 18px; line-height: 1; }
        .control-section { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 6px 0 14px; }
        .control-section .btn { flex: 1 0 auto; min-width: 70px; }
        .control-section .btn-lg { padding: 12px 18px; font-size: 17px; flex: 1.5 0 auto; }
        .toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; color: #3a5a7a; margin-left: 4px; white-space: nowrap; }
        .toggle-wrap input[type="checkbox"] { width: 20px; height: 20px; accent-color: #2b7be4; cursor: pointer; }
        .status-area { background: #f7faff; border-radius: 16px; padding: 14px 18px; margin-top: 6px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; border: 1.5px solid #e6eef8; min-height: 60px; }
        .status-msg { font-size: 15px; color: #3a5a7a; display: flex; align-items: center; gap: 8px; flex: 1; }
        .status-msg .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #e6eef8; border-top-color: #2b7be4; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .score-display { display: flex; align-items: center; gap: 12px; }
        .score-circle { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; background: #e6eef8; color: #2b7be4; flex-shrink: 0; transition: all 0.4s; }
        .score-circle.high { background: #d4f0e6; color: #1fad7a; }
        .score-circle.mid { background: #fef0d9; color: #f5a623; }
        .score-circle.low { background: #fde8e8; color: #e45c5c; }
        .score-label { font-size: 13px; color: #5a7a9a; font-weight: 500; }
        .lang-select { padding: 6px 12px; border-radius: 30px; border: 1.5px solid #c8d8e8; background: #fff; font-size: 14px; font-weight: 500; color: #1e2a3a; outline: none; cursor: pointer; font-family: inherit; }
        .lang-select:focus { border-color: #2b7be4; }
        .empty-hint { color: #8aaac0; text-align: center; padding: 20px 0 10px; font-size: 14px; }
        @media (max-width: 500px) {
            .app { padding: 16px 12px 20px; border-radius: 20px; }
            .title { font-size: 20px; }
            .title span { font-size: 12px; line-height: 24px; padding: 0 10px; }
            .speed-wrap { padding: 2px 10px 2px 12px; font-size: 13px; }
            .speed-wrap input[type="range"] { width: 70px; }
            .input-section textarea { height: 90px; font-size: 14px; }
            .control-section .btn-lg { font-size: 15px; padding: 10px 14px; }
            .dialogue-item { font-size: 14px; padding: 8px 12px; }
            .score-circle { width: 48px; height: 48px; font-size: 17px; }
            .status-area { padding: 12px 14px; flex-direction: column; align-items: stretch; }
            .score-display { justify-content: flex-end; }
        }
        @media (max-width: 380px) {
            .control-section .btn { font-size: 13px; padding: 8px 12px; min-width: 56px; }
            .toggle-wrap { font-size: 12px; }
        }
        .mt-8 { margin-top: 8px; }
        .flex-center { display: flex; align-items: center; gap: 6px; }
        .gap-4 { gap: 4px; }
        .text-muted { color: #8aaac0; font-size: 13px; }
        .w-full { width: 100%; }
    </style>
</head>
<body>

    <div class="app" id="app">

        <div class="header">
            <div class="title">🎯 口语练习<span>跟读</span></div>
            <div class="speed-wrap">
                <span>🐢</span>
                <input type="range" id="speedRange" min="0.5" max="2.0" step="0.05" value="1.0">
                <span>🐇</span>
                <span class="speed-val" id="speedVal">1.0×</span>
            </div>
        </div>

        <div class="input-section">
            <textarea id="dialogueInput" placeholder="在此输入对话，格式：&#10;A: 你好，最近怎么样？&#10;B: 我很好，谢谢！&#10;A: 周末有什么计划？">A: 你好，今天过得怎么样？  
B: 我很好，谢谢关心！  
A: 周末有什么计划吗？  
B: 我打算和家人一起去海边。  
A: 听起来很棒！祝你们玩得开心。  
B: 谢谢！我非常期待。</textarea>
            <div class="input-tools">
                <button type="button" class="btn btn-primary" id="parseBtn">📝 解析对话</button>
                <button type="button" class="btn btn-outline btn-sm" id="loadExampleBtn">📋 加载示例</button>
                <select class="lang-select" id="langSelect">
                    <option value="zh-CN">🇨🇳 中文</option>
                    <option value="en-US">🇬🇧 英文</option>
                    <option value="auto">🌐 自动</option>
                </select>
            </div>
        </div>

        <div class="dialogue-section">
            <div class="dialogue-header">
                <span class="counter" id="counterDisplay">共 0 句</span>
                <span class="text-muted" id="progressDisplay">—</span>
            </div>
            <div class="dialogue-list" id="dialogueList">
                <div class="empty-hint">👆 输入对话并点击「解析对话」</div>
            </div>
        </div>

        <div class="control-section">
            <button type="button" class="btn btn-primary btn-lg" id="playBtn" disabled>▶ 播放</button>
            <button type="button" class="btn btn-success btn-lg" id="repeatBtn" disabled>🎤 跟读</button>
            <button type="button" class="btn btn-outline" id="nextBtn" disabled>⏭ 下一句</button>
            <div class="toggle-wrap">
                <input type="checkbox" id="autoNextCheck" checked>
                <label for="autoNextCheck">自动下一句</label>
            </div>
        </div>

        <div class="status-area" id="statusArea">
            <div class="status-msg" id="statusMsg"><span>💡 解析对话后开始练习</span></div>
            <div class="score-display">
                <div class="score-circle" id="scoreCircle">—</div>
                <div>
                    <div class="score-label">相似度</div>
                    <div class="score-label" style="font-size:12px; color:#8aaac0;" id="scoreDetail">等待评分</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ================================================================
        // 彻底修复手机录音：移除 getMedia 预检，使用明确语言标签，增强事件
        // ================================================================

        (function() {
            'use strict';

            // ---------- DOM ----------
            const dialogueInput = document.getElementById('dialogueInput');
            const parseBtn = document.getElementById('parseBtn');
            const loadExampleBtn = document.getElementById('loadExampleBtn');
            const langSelect = document.getElementById('langSelect');
            const dialogueList = document.getElementById('dialogueList');
            const counterDisplay = document.getElementById('counterDisplay');
            const progressDisplay = document.getElementById('progressDisplay');
            const playBtn = document.getElementById('playBtn');
            const repeatBtn = document.getElementById('repeatBtn');
            const nextBtn = document.getElementById('nextBtn');
            const autoNextCheck = document.getElementById('autoNextCheck');
            const speedRange = document.getElementById('speedRange');
            const speedVal = document.getElementById('speedVal');
            const statusMsg = document.getElementById('statusMsg');
            const scoreCircle = document.getElementById('scoreCircle');
            const scoreDetail = document.getElementById('scoreDetail');

            // ---------- State ----------
            let dialogues = [];
            let currentIndex = 0;
            let isPlaying = false;
            let isRepeating = false;
            let isRecognizing = false;
            let recognition = null;
            let synth = window.speechSynthesis;
            let currentUtterance = null;
            let callbackCalled = false;
            let soundStarted = false; // 标记是否已开始录音

            const isSpeechSupported = (typeof synth !== 'undefined' && synth !== null);

            // ---------- 示例 ----------
            const DEFAULT_EXAMPLE = `A: Hello, how are you doing today?
B: I'm doing great, thank you for asking!
A: Would you like to go for a walk?
B: That sounds like a wonderful idea.
A: Let's go to the park then.
B: Perfect, I'll get my coat.`;

            const CN_EXAMPLE = `A: 你好，今天过得怎么样？  
B: 我很好，谢谢关心！  
A: 周末有什么计划吗？  
B: 我打算和家人一起去海边。  
A: 听起来很棒！祝你们玩得开心。  
B: 谢谢！我非常期待。`;

            // ---------- 工具 ----------
            function levenshteinDistance(a, b) {
                if (a.length === 0) return b.length;
                if (b.length === 0) return a.length;
                const matrix = [];
                for (let i = 0; i <= b.length; i++) matrix[i] = [i];
                for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
                for (let i = 1; i <= b.length; i++) {
                    for (let j = 1; j <= a.length; j++) {
                        const cost = a[j - 1] === b[i - 1] ? 0 : 1;
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j] + 1,
                            matrix[i][j - 1] + 1,
                            matrix[i - 1][j - 1] + cost
                        );
                    }
                }
                return matrix[b.length][a.length];
            }

            function similarityScore(original, spoken) {
                if (!original || !spoken) return 0;
                const clean = (s) => {
                    let str = s.trim();
                    if (langSelect.value === 'en-US' || langSelect.value === 'auto') {
                        str = str.toLowerCase();
                    }
                    str = str.replace(/\s+/g, ' ');
                    return str;
                };
                const o = clean(original);
                const s = clean(spoken);
                if (o.length === 0 && s.length === 0) return 100;
                if (o.length === 0 || s.length === 0) return 0;
                const dist = levenshteinDistance(o, s);
                const maxLen = Math.max(o.length, s.length);
                const score = Math.max(0, Math.round((1 - dist / maxLen) * 100));
                return Math.min(100, score);
            }

            // ---------- 解析对话 ----------
            function parseDialogue(text) {
                let normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
                normalized = normalized.trim();
                const lines = normalized.split('\n');
                const result = [];
                const regex = /^([^:：]+)[:：]\s*(.*)$/;

                for (let line of lines) {
                    const trimmed = line.trim();
                    if (trimmed === '') continue;
                    const match = trimmed.match(regex);
                    if (match) {
                        const speaker = match[1].trim();
                        const content = match[2].trim();
                        if (content) {
                            result.push({ speaker, text: content, score: null });
                        }
                    } else {
                        result.push({ speaker: '?', text: trimmed, score: null });
                    }
                }
                return result;
            }

            // ---------- 渲染 ----------
            function renderDialogues() {
                if (!dialogues || dialogues.length === 0) {
                    dialogueList.innerHTML = `<div class="empty-hint">👆 输入对话并点击「解析对话」</div>`;
                    counterDisplay.textContent = '共 0 句';
                    progressDisplay.textContent = '—';
                    playBtn.disabled = true;
                    repeatBtn.disabled = true;
                    nextBtn.disabled = true;
                    return;
                }

                let html = '';
                dialogues.forEach((item, idx) => {
                    const isActive = idx === currentIndex;
                    const isDone = item.score !== null && item.score !== undefined;
                    const scoreText = item.score !== null ? `${item.score}分` : '';
                    const cls = `dialogue-item${isActive ? ' active' : ''}${isDone ? ' done' : ''}`;
                    const icon = isActive ? '👉' : (isDone ? '✅' : '');
                    html += `
                        <div class="${cls}" data-index="${idx}">
                            <span class="speaker">${escapeHtml(item.speaker)}</span>
                            <span class="text">${escapeHtml(item.text)}</span>
                            ${scoreText ? `<span class="score-badge">${scoreText}</span>` : ''}
                            ${icon ? `<span class="status-icon">${icon}</span>` : ''}
                        </div>
                    `;
                });
                dialogueList.innerHTML = html;

                const activeEl = dialogueList.querySelector('.dialogue-item.active');
                if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });

                counterDisplay.textContent = `共 ${dialogues.length} 句`;
                const total = dialogues.length;
                const doneCount = dialogues.filter(d => d.score !== null).length;
                progressDisplay.textContent = `已完成 ${doneCount}/${total} 句`;

                playBtn.disabled = false;
                repeatBtn.disabled = false;
                nextBtn.disabled = false;

                if (!isSpeechSupported && dialogues.length > 0) {
                    setStatus('⚠️ 当前浏览器不支持语音播放，但「跟读」评分功能可用。建议使用 Chrome 浏览器。', false, true);
                }

                updateScoreDisplay();
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function updateScoreDisplay() {
                const item = dialogues[currentIndex];
                if (item && item.score !== null && item.score !== undefined) {
                    const s = item.score;
                    scoreCircle.textContent = s;
                    scoreCircle.className = 'score-circle';
                    if (s >= 80) scoreCircle.classList.add('high');
                    else if (s >= 60) scoreCircle.classList.add('mid');
                    else scoreCircle.classList.add('low');
                    scoreDetail.textContent = `当前句得分`;
                } else {
                    scoreCircle.textContent = '—';
                    scoreCircle.className = 'score-circle';
                    scoreDetail.textContent = '等待评分';
                }
            }

            function setStatus(msg, isSpinner = false, isError = false) {
                const icon = isError ? '❌' : (isSpinner ? '' : '💡');
                const spinnerHtml = isSpinner ? '<span class="spinner"></span>' : '';
                statusMsg.innerHTML = `
                    ${icon ? `<span>${icon}</span>` : ''}
                    ${spinnerHtml}
                    <span>${msg}</span>
                `;
            }

            // ---------- 语音合成 ----------
            function speakCurrent(callback) {
                if (!isSpeechSupported) {
                    setStatus('❌ 当前浏览器不支持语音播放，请使用 Chrome 或 Edge 浏览器', false, true);
                    if (callback) callback();
                    return;
                }
                if (!dialogues.length || currentIndex >= dialogues.length) {
                    if (callback) callback();
                    return;
                }
                const item = dialogues[currentIndex];
                const text = item.text;
                const rate = parseFloat(speedRange.value) || 1.0;

                if (synth.speaking) synth.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = getSpeechLang();
                utterance.rate = rate;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;

                const voices = synth.getVoices();
                const preferred = voices.find(v => v.lang.startsWith(utterance.lang.split('-')[0]));
                if (preferred) utterance.voice = preferred;

                currentUtterance = utterance;
                isPlaying = true;
                setStatus('🔊 播放中...', true);

                utterance.onend = function() {
                    isPlaying = false;
                    currentUtterance = null;
                    if (callback) callback();
                };
                utterance.onerror = function(e) {
                    console.warn('Speech synthesis error:', e);
                    isPlaying = false;
                    currentUtterance = null;
                    if (callback) callback();
                };

                synth.speak(utterance);
            }

            // 获取明确的语言标签，绝不返回 'auto'
            function getSpeechLang() {
                const val = langSelect.value;
                if (val === 'auto') {
                    // 自动检测：检查当前句是否有中文
                    const text = dialogues[currentIndex]?.text || '';
                    return /[\u4e00-\u9fff]/.test(text) ? 'zh-CN' : 'en-US';
                }
                return val;
            }

            // ---------- 语音识别（修复版） ----------
            function initRecognition() {
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SR) {
                    setStatus('❌ 浏览器不支持语音识别，请使用 Chrome 或 Edge', false, true);
                    return null;
                }

                try {
                    const rec = new SR();
                    rec.continuous = false;
                    rec.interimResults = true;
                    rec.maxAlternatives = 1;
                    // 强制设置明确语言
                    const lang = getSpeechLang();
                    rec.lang = lang;
                    console.log('✅ 识别语言:', lang);
                    return rec;
                } catch (e) {
                    console.warn('SpeechRecognition init failed:', e);
                    setStatus('❌ 初始化语音识别失败: ' + e.message, false, true);
                    return null;
                }
            }

            function startRecognition(callback) {
                if (isRecognizing) {
                    if (recognition) recognition.abort();
                    isRecognizing = false;
                }

                recognition = initRecognition();
                if (!recognition) {
                    if (callback) callback(null);
                    return;
                }

                isRecognizing = true;
                callbackCalled = false;
                soundStarted = false;
                setStatus('🎤 正在启动录音...', true);

                let recognizedText = '';

                // 监听真正开始录音的事件
                recognition.onsoundstart = function() {
                    soundStarted = true;
                    setStatus('🎤 长按录音，松手结束...', true);
                };

                recognition.onsoundend = function() {
                    // 录音结束（自动或手动）
                };

                recognition.onresult = function(event) {
                    const result = event.results[0];
                    if (result) {
                        const transcript = result[0].transcript.trim();
                        if (result.isFinal) {
                            recognizedText = transcript;
                            setStatus(`✅ 识别到: "${transcript}"`, false);
                        } else {
                            setStatus(`🎤 正在听: ${transcript}`, true);
                        }
                    }
                };

                recognition.onerror = function(event) {
                    console.warn('Recognition error:', event.error);
                    isRecognizing = false;
                    if (!callbackCalled) {
                        callbackCalled = true;
                        let msg = '';
                        if (event.error === 'not-allowed') {
                            msg = '❌ 请允许使用麦克风权限后重试（请在浏览器设置中开启）';
                        } else if (event.error === 'no-speech') {
                            msg = '⏳ 未检测到语音，请重试';
                        } else if (event.error === 'audio-capture') {
                            msg = '❌ 无法访问麦克风，请检查权限或设备';
                        } else {
                            msg = `❌ 识别错误: ${event.error}`;
                        }
                        setStatus(msg, false, true);
                        if (callback) callback(null);
                    }
                };

                recognition.onend = function() {
                    isRecognizing = false;
                    if (!callbackCalled) {
                        callbackCalled = true;
                        if (recognizedText) {
                            const original = dialogues[currentIndex]?.text || '';
                            const score = similarityScore(original, recognizedText);
                            dialogues[currentIndex].score = score;
                            renderDialogues();
                            setStatus(`✅ 识别完成: "${recognizedText}"`, false);
                            if (callback) callback(score);
                        } else {
                            // 如果从未触发 onsoundstart，说明录音没真正开始
                            if (!soundStarted) {
                                setStatus('❌ 录音未能启动，请重试或检查麦克风权限', false, true);
                            } else {
                                setStatus('⏳ 未识别到语音，请重试', false, true);
                            }
                            if (callback) callback(null);
                        }
                    }
                };

                try {
                    recognition.start();
                    // 设置超时：如果5秒内没有触发 onsoundstart，则提示用户
                    setTimeout(() => {
                        if (isRecognizing && !soundStarted && !callbackCalled) {
                            // 可能是权限被阻止或设备问题
                            recognition.abort();
                            isRecognizing = false;
                            if (!callbackCalled) {
                                callbackCalled = true;
                                setStatus('⏳ 启动录音超时，请检查麦克风权限并重试', false, true);
                                if (callback) callback(null);
                            }
                        }
                    }, 5000);
                } catch (e) {
                    console.warn('Recognition start error:', e);
                    isRecognizing = false;
                    if (!callbackCalled) {
                        callbackCalled = true;
                        setStatus('❌ 无法启动语音识别: ' + e.message, false, true);
                        if (callback) callback(null);
                    }
                }
            }

            // ---------- 核心操作 ----------
            function goToNext() {
                if (!dialogues.length) return;
                if (currentIndex < dialogues.length - 1) {
                    currentIndex++;
                    renderDialogues();
                    updateScoreDisplay();
                    setStatus(`📖 第 ${currentIndex + 1} 句`);
                } else {
                    setStatus('🎉 全部完成！很棒！');
                }
            }

            function handlePlay() {
                if (isPlaying) {
                    if (isSpeechSupported && synth.speaking) {
                        synth.cancel();
                    }
                    isPlaying = false;
                    setStatus('⏹ 已停止');
                    return;
                }
                if (!dialogues.length) return;
                if (currentIndex >= dialogues.length) currentIndex = 0;

                speakCurrent(() => {
                    if (autoNextCheck.checked && !isRepeating) {
                        goToNext();
                    } else {
                        if (isSpeechSupported) {
                            setStatus('🔊 播放完成');
                        }
                    }
                });
            }

            // ---------- 跟读：长按录音（仅使用 touch 事件，提高手机兼容性） ----------
            function handleRepeatStart(e) {
                e.preventDefault();
                if (isRepeating) return;
                if (!dialogues.length) return;
                if (currentIndex >= dialogues.length) currentIndex = 0;

                if (isSpeechSupported && synth.speaking) {
                    synth.cancel();
                }
                if (isPlaying) isPlaying = false;

                isRepeating = true;
                setStatus('🎤 准备录音...', true);

                startRecognition((score) => {
                    isRepeating = false;
                    if (score !== null && score !== undefined) {
                        dialogues[currentIndex].score = score;
                        renderDialogues();
                        updateScoreDisplay();
                        setStatus(`✅ 得分 ${score} 分`);
                        if (autoNextCheck.checked) {
                            setTimeout(() => { goToNext(); }, 1200);
                        }
                    } else {
                        // 错误已显示
                    }
                });
            }

            function handleRepeatEnd(e) {
                e.preventDefault();
                if (!isRepeating) return;
                if (recognition && isRecognizing) {
                    try {
                        recognition.stop();
                    } catch (err) {}
                }
            }

            function handleNext() {
                if (isPlaying) {
                    if (isSpeechSupported && synth.speaking) {
                        synth.cancel();
                    }
                    isPlaying = false;
                }
                if (isRepeating) {
                    if (isRecognizing && recognition) {
                        recognition.abort();
                        isRecognizing = false;
                    }
                    isRepeating = false;
                }
                goToNext();
            }

            // ---------- 解析并渲染 ----------
            function parseAndRender() {
                try {
                    if (isSpeechSupported && synth.speaking) {
                        synth.cancel();
                    }
                    if (isRecognizing && recognition) {
                        recognition.abort();
                        isRecognizing = false;
                    }
                    isPlaying = false;
                    isRepeating = false;

                    const raw = dialogueInput.value;
                    dialogues = parseDialogue(raw);
                    currentIndex = 0;
                    renderDialogues();
                    updateScoreDisplay();

                    if (dialogues.length > 0) {
                        let msg = `📖 已解析 ${dialogues.length} 句，`;
                        if (isSpeechSupported) {
                            msg += '点击「播放」听原句，长按「跟读」录音评分';
                        } else {
                            msg += '⚠️ 当前浏览器不支持语音播放，但「跟读」评分功能可用。建议使用 Chrome。';
                        }
                        setStatus(msg);
                    } else {
                        const lineCount = raw.split('\n').length;
                        setStatus(`⚠️ 未解析到有效对话（共 ${lineCount} 行），请确保格式如 "A: 内容"`, false, true);
                        console.warn('解析失败，原始文本:', raw);
                    }
                } catch (err) {
                    console.error('解析错误:', err);
                    setStatus(`❌ 解析出错: ${err.message}`, false, true);
                }
            }

            function loadExample() {
                const currentLang = langSelect.value;
                if (currentLang === 'zh-CN') {
                    dialogueInput.value = CN_EXAMPLE;
                } else {
                    dialogueInput.value = DEFAULT_EXAMPLE;
                }
                parseAndRender();
            }

            // ---------- 事件绑定 ----------
            speedRange.addEventListener('input', function() {
                const val = parseFloat(this.value).toFixed(1);
                speedVal.textContent = val + '×';
            });

            langSelect.addEventListener('change', function() {
                const current = dialogueInput.value.trim();
                const isDefaultEn = current === DEFAULT_EXAMPLE.trim();
                const isDefaultCn = current === CN_EXAMPLE.trim();
                if (isDefaultEn && this.value === 'zh-CN') {
                    dialogueInput.value = CN_EXAMPLE;
                } else if (isDefaultCn && this.value !== 'zh-CN') {
                    dialogueInput.value = DEFAULT_EXAMPLE;
                }
            });

            if (isSpeechSupported) {
                synth.getVoices();
                synth.onvoiceschanged = function() {
                    synth.getVoices();
                };
            }

            parseBtn.addEventListener('click', parseAndRender);
            loadExampleBtn.addEventListener('click', loadExample);
            playBtn.addEventListener('click', handlePlay);

            // 手机专用：仅使用 touch 事件，避免 pointer 冲突
            repeatBtn.addEventListener('touchstart', handleRepeatStart, { passive: false });
            repeatBtn.addEventListener('touchend', handleRepeatEnd, { passive: false });
            repeatBtn.addEventListener('touchcancel', handleRepeatEnd, { passive: false });

            // 桌面端备用：使用 mouse 事件（但主要是手机用，保留 pointer 兼容）
            repeatBtn.addEventListener('mousedown', handleRepeatStart);
            repeatBtn.addEventListener('mouseup', handleRepeatEnd);
            repeatBtn.addEventListener('mouseleave', handleRepeatEnd);

            // 阻止 click 防止误触
            repeatBtn.addEventListener('click', function(e) { e.preventDefault(); });

            nextBtn.addEventListener('click', handleNext);

            dialogueList.addEventListener('click', function(e) {
                const item = e.target.closest('.dialogue-item');
                if (!item) return;
                const idx = parseInt(item.dataset.index, 10);
                if (!isNaN(idx) && idx >= 0 && idx < dialogues.length && idx !== currentIndex) {
                    if (isPlaying) {
                        if (isSpeechSupported && synth.speaking) {
                            synth.cancel();
                        }
                        isPlaying = false;
                    }
                    if (isRepeating) {
                        if (isRecognizing && recognition) {
                            recognition.abort();
                            isRecognizing = false;
                        }
                        isRepeating = false;
                    }
                    currentIndex = idx;
                    renderDialogues();
                    updateScoreDisplay();
                    setStatus(`📖 第 ${currentIndex + 1} 句`);
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT')
                    return;
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (playBtn.disabled) return;
                    handlePlay();
                }
            });

            // ---------- 初始化 ----------
            dialogueInput.value = CN_EXAMPLE;
            setTimeout(() => {
                parseAndRender();
                if (isSpeechSupported) {
                    setTimeout(() => { synth.getVoices(); }, 200);
                }
            }, 100);

            console.log('🎯 口语练习工具已加载！');
            console.log('💡 点击「播放」听原句，长按「跟读」录音评分（无时间限制，松手即完成）');

            window.__app = {
                dialogues: () => dialogues,
                currentIndex: () => currentIndex,
                parse: parseAndRender,
                goNext: goToNext,
            };

        })();
    </script>
</body>
</html>
